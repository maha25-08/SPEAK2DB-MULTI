<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Book - Library Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/student.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard.student_dashboard') }}">
                <i class="fas fa-book"></i> Library Management
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('dashboard.student_dashboard') }}">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a class="nav-link active" href="/student/request-book">
                    <i class="fas fa-plus-circle"></i> Request Book
                </a>
                <a class="nav-link" href="/student/my-requests">
                    <i class="fas fa-list"></i> My Requests
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="fas fa-book-plus"></i> Request a Book</h5>
                    </div>
                    <div class="card-body">
                        <form id="bookRequestForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="bookTitle" class="form-label">Book Title *</label>
                                    <input type="text" class="form-control" id="bookTitle" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="author" class="form-label">Author *</label>
                                    <input type="text" class="form-control" id="author" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="isbn" class="form-label">ISBN (if known)</label>
                                    <input type="text" class="form-control" id="isbn" placeholder="978-0-123456-78-9">
                                </div>
                                <div class="col-md-6">
                                    <label for="requestType" class="form-label">Request Type *</label>
                                    <select class="form-select" id="requestType" required>
                                        <option value="">Select type...</option>
                                        <option value="New Book">New Book Request</option>
                                        <option value="Additional Copy">Additional Copy</option>
                                        <option value="Replacement">Replacement</option>
                                        <option value="Special Edition">Special Edition</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="urgency" class="form-label">Urgency *</label>
                                    <select class="form-select" id="urgency" required>
                                        <option value="">Select urgency...</option>
                                        <option value="Low">Low - Can wait</option>
                                        <option value="Medium">Medium - Needed soon</option>
                                        <option value="High">High - Urgent</option>
                                        <option value="Critical">Critical - Immediate need</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Request Date</label>
                                    <input type="text" class="form-control" value="{{ moment().format('YYYY-MM-DD') }}" readonly>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="reason" class="form-label">Reason for Request *</label>
                                <textarea class="form-control" id="reason" rows="4" required
                                    placeholder="Please explain why you need this book and how it will help your studies..."></textarea>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary me-md-2" onclick="clearForm()">
                                    <i class="fas fa-times"></i> Clear
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane"></i> Submit Request
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-check-circle"></i> Request Submitted</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Your book request has been submitted successfully!</p>
                    <p>You can track the status of your request in "My Requests" section.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="window.location.href='/student/my-requests'">
                        View My Requests
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Submit Another</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('bookRequestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                book_title: document.getElementById('bookTitle').value,
                author: document.getElementById('author').value,
                isbn: document.getElementById('isbn').value,
                request_type: document.getElementById('requestType').value,
                urgency: document.getElementById('urgency').value,
                reason: document.getElementById('reason').value
            };
            
            try {
                const response = await fetch('/student/request-book', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Show success modal
                    const modal = new bootstrap.Modal(document.getElementById('successModal'));
                    modal.show();
                    
                    // Clear form
                    clearForm();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while submitting your request');
            }
        });
        
        function clearForm() {
            document.getElementById('bookRequestForm').reset();
        }
        
        // Set today's date
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[readonly]').value = today;
        });
    </script>
</body>
</html>
