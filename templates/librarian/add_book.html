{% extends "librarian/_base.html" %}
{% block title %}Add Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="section-card">
            <div class="section-header">
                <span><i class="fas fa-plus-circle"></i>Add New Book</span>
            </div>
            <div class="p-4">
                <form method="POST" action="{{ url_for('librarian.add_book') }}" novalidate>
                    <div class="mb-3">
                        <label for="title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                        <input type="text" id="title" name="title" class="form-control"
                               placeholder="Book title" value="{{ request.form.get('title', '') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label fw-semibold">Author <span class="text-danger">*</span></label>
                        <input type="text" id="author" name="author" class="form-control"
                               placeholder="Author name" value="{{ request.form.get('author', '') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label fw-semibold">Category</label>
                        <input type="text" id="category" name="category" class="form-control"
                               placeholder="e.g. Fiction, Science, History"
                               value="{{ request.form.get('category', '') }}">
                    </div>
                    <div class="mb-4">
                        <label for="total_copies" class="form-label fw-semibold">Total Copies</label>
                        <input type="number" id="total_copies" name="total_copies" class="form-control"
                               min="1" value="{{ request.form.get('total_copies', 1) }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Save Book
                        </button>
                        <a href="{{ url_for('librarian.books') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
