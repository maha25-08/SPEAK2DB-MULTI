<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak2DB - Faculty Registration</title>
    <link rel="stylesheet" href="/static/css/style.css?v=13">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gradient-bg);
            font-family: 'Inter', sans-serif;
            padding: 2rem;
        }
        .register-card {
            width: 100%;
            max-width: 760px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,.3);
        }
        .register-card h1 {
            font-size: 3rem;
            margin-bottom: .5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .register-card p { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        label {
            display: block;
            font-size: 1rem;
            margin-bottom: .4rem;
            font-weight: 600;
            color: var(--text);
        }
        input {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text);
            padding: .9rem 1rem;
            box-sizing: border-box;
        }
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: .9rem 1.4rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .flash-message {
            margin-bottom: 1rem;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .875rem;
        }
        .flash-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        .flash-message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>🏫 Faculty Registration</h1>
        <p>Create a new faculty account to access Speak2DB.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register_faculty') }}">
            <div class="grid">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>
                <div>
                    <label for="full_name">Full Name</label>
                    <input id="full_name" name="full_name" required>
                </div>
                <div>
                    <label for="department">Department</label>
                    <input id="department" name="department" required>
                </div>
                <div>
                    <label for="designation">Designation</label>
                    <input id="designation" name="designation" required>
                </div>
                <div>
                    <label for="specialization">Specialization</label>
                    <input id="specialization" name="specialization" required>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Register as Faculty</button>
                <a class="btn btn-secondary" href="/login">Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
